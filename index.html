<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Tập Tuần 6 - Layout </title>
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

    
        .topHeader {
            background-color: #f1f1f1;
            padding: 5px;
            overflow: hidden;
        }

        /* [cite: 32] Navigation: hệ thống menu */
        .navigation {
            background-color: #4CAF50;
            padding: 10px;
            text-align: center;
        }
        .navigation a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

      
        .header {
            display: flex;
            height: 120px;
            border-bottom: 1px solid #ccc;
        }
        .logo {
            width: 20%;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .banner {
            width: 80%;
            background-color: #eee;
            display: flex;
            align-items: center;
            padding-left: 20px;
        }

        /* [cite: 42, 54] Dùng Flex cho Main Layout */
        .main-container {
            display: flex;
            min-height: 400px;
        }

     
        .sidebar {
            width: 25%;
            background-color: #fafafa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

     
        .content-area {
            width: 75%;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

       
        .item {
            width: calc(33.33% - 15px);
            height: 180px;
            background-color: white;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

    
        .item:hover {
            transform: scale(1.1); 
            filter: brightness(1.2);
            cursor: pointer;
        }

    
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            clear: both;
        }
    </style>
</head>
<body>

    <div class="topHeader">
        <marquee direction="left">Sản phẩm mới | Tin tức công nghệ | Khuyến mãi đặc biệt</marquee>
    </div>

    <nav class="navigation">
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Tin tức</a>
        <a href="#">Liên hệ</a>
    </nav>

    <header class="header">
        <div class="logo">LOGO</div>
        <div class="banner">HÌNH ẢNH BANNER</div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Danh mục</h3>
            <ul>
                <li>Sản phẩm nổi bật</li>
                <li>Tin khuyến mãi</li>
            </ul>
        </aside>

        <main class="content-area">
            <div class="item">Sản phẩm 1</div>
            <div class="item">Sản phẩm 2</div>
            <div class="item">Sản phẩm 3</div>
            <div class="item">Sản phẩm 4</div>
        </main>
    </div>

    <footer class="footer">
        <p>Họ tên SV: <b>[Điền Tên Bạn]</b> - MSSV: <b>[Điền MSSV]</b></p>
        <p>© 2026 Bản quyền thuộc về sinh viên HUIT</p>
    </footer>

</body>
</html>
